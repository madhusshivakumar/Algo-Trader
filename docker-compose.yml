# ============================================================
#  Algo Trader — Docker Compose Orchestration
#
#  Usage:
#    docker compose up -d              # Start all services
#    docker compose down               # Stop all services
#    docker compose logs -f engine     # Follow engine logs
#    docker compose logs -f agents     # Follow agent logs
#    docker compose exec agents python agents/health_check.py  # Run agent manually
#    docker compose run --rm engine python backtest.py --monte-carlo --symbols AAPL
# ============================================================

services:
  engine:
    build: .
    container_name: algo-engine
    command: bash scripts/entrypoint.sh
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - db-data:/app/db
    environment:
      - DB_PATH=/app/db/trades.db
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/db/trades.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: .
    container_name: algo-dashboard
    command: python dashboard.py
    restart: unless-stopped
    env_file: .env
    ports:
      - "5050:5050"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - db-data:/app/db
    environment:
      - DB_PATH=/app/db/trades.db
      - DASHBOARD_HOST=0.0.0.0
    depends_on:
      engine:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  agents:
    build: .
    container_name: algo-agents
    init: true
    command: supercronic /app/crontab
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - db-data:/app/db
    environment:
      - DB_PATH=/app/db/trades.db
      - TZ=America/New_York
    depends_on:
      engine:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
    driver: local
